name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROD_PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy auth-protected functions
        run: |
          set -euo pipefail
          for fn in \
            convoy-defect-escalation \
            process-timesheet-math \
            process-integration-sync-queue \
            convoy-daily-health-check
          do
            echo "Deploying ${fn}..."
            supabase functions deploy "${fn}" --project-ref "${PROJECT_REF}"
          done

      - name: Deploy public webhook functions
        run: |
          set -euo pipefail
          for fn in \
            webhooks-ingest \
            resend-webhook \
            stripe-webhook \
            polar-webhook \
            revenuecat-webhook
          do
            echo "Deploying ${fn} with --no-verify-jwt..."
            supabase functions deploy "${fn}" --project-ref "${PROJECT_REF}" --no-verify-jwt
          done
