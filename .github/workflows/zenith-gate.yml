name: Zenith Quality Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: zenith-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Project Terminus: Vitest unit tests ──────────────────────────────────
  vitest-unit:
    name: Vitest Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npx vitest run --reporter=verbose

  # ── Project Terminus: Lint enforcement (zero-regression) ─────────────────
  lint-gate:
    name: Lint Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint baseline check
        run: npm run lint:baseline

  supabase-rls:
    name: Supabase RLS pgTAP
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [vitest-unit, lint-gate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run RLS gate
        run: npm run test:db:rls

  web-golden-thread:
    name: Web Golden Thread
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: [supabase-rls]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run golden thread
        env:
          CI: true
        run: npm run test:e2e:golden-thread

  web-e2e-full:
    name: Web Full E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [web-golden-thread]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run full web e2e
        env:
          CI: true
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zenith-playwright
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  flutter-patrol-ios:
    name: Flutter Patrol iOS
    runs-on: macos-latest
    timeout-minutes: 55
    needs: [web-e2e-full]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.0"
          channel: stable
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Flutter dependencies
        working-directory: flutter
        run: flutter pub get

      - name: Run Patrol integration tests
        run: npm run test:mobile

      - name: Upload Flutter artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zenith-flutter-patrol-ios
          path: |
            flutter/screenshots/
            flutter/test_report.log
          retention-days: 14

  audit-briefing:
    name: Zenith Audit Briefing
    runs-on: ubuntu-latest
    if: always()
    needs: [supabase-rls, web-golden-thread, web-e2e-full, flutter-patrol-ios]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Generate Zenith release audit
        run: npm run audit:zenith

      - name: Append CI outcomes
        run: |
          FILE=$(ls audit-reports/zenith-release-audit-*.md | head -1)
          {
            echo ""
            echo "## CI Execution Results"
            echo ""
            echo "- Supabase RLS pgTAP: **${{ needs.supabase-rls.result }}**"
            echo "- Web Golden Thread: **${{ needs.web-golden-thread.result }}**"
            echo "- Web Full E2E: **${{ needs.web-e2e-full.result }}**"
            echo "- Flutter Patrol iOS: **${{ needs.flutter-patrol-ios.result }}**"
          } >> "$FILE"

      - name: Upload Zenith audit
        uses: actions/upload-artifact@v4
        with:
          name: zenith-release-audit
          path: audit-reports/zenith-release-audit-*.md
          retention-days: 30
